# ==============================================================================
#  ~/.tmux.conf
# ==============================================================================


# ==============================================================================
#  SHELL
# ==============================================================================

set -g default-shell /bin/bash
set -g default-command "/bin/bash -l"


# ==============================================================================
#  GENERAL
# ==============================================================================

set -g set-clipboard on
set -g detach-on-destroy off
set -sg escape-time 0

# 24-bit colour passthrough - required for vim colourschemes to work in tmux
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 1000000
set -g mouse on
set -g status-interval 3
set -g status-position top
set -g focus-events on
set -g display-panes-time 2000


# ==============================================================================
#  WINDOWS & PANES
# ==============================================================================

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on


# ==============================================================================
#  PREFIX
# ==============================================================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix


# ==============================================================================
#  KEY BINDINGS
# ==============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "config reloaded"

# Split panes in current directory
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Maximize/restore pane
bind m resize-pane -Z

# Paste buffer
bind P paste-buffer


# ==============================================================================
#  PANE NAVIGATION
#  Handled by the christoomey/vim-tmux-navigator TPM plugin (see PLUGINS).
#  The plugin checks whether the active pane is running nvim; if so it forwards
#  C-h/j/k/l into nvim for split navigation, otherwise it switches tmux panes.
#  Requires the matching nvim plugin: christoomey/vim-tmux-navigator.
# ==============================================================================


# ==============================================================================
#  WINDOW SWITCHING
# ==============================================================================

bind -n M-h previous-window
bind -n M-l next-window


# ==============================================================================
#  SESSION MANAGEMENT
# ==============================================================================

# prefix+S  session switcher
bind S choose-session

# prefix+X  kill current session, move to next
bind X confirm-before -p "kill session #S? (y/n)" \
    "run-shell 'tmux switch-client -n; tmux kill-session -t #S'"

# prefix+N  new named session
bind N command-prompt -p "session name:" "new-session -s '%1' -c '#{pane_current_path}'"

# Auto-colour: each session index gets its own status bar colour.
# Session 1 = blue, Session 2 = green, Session 3 = orange.
# Runs on every session switch so the bar always reflects the active session.
set-hook -g client-session-changed 'run-shell "~/.config/tmux/session-colour.sh"'
set-hook -g session-created        'run-shell "~/.config/tmux/session-colour.sh"'


# ==============================================================================
#  WORD SEPARATORS
#  Stops tmux treating _ as a word boundary so CMSSW paths select correctly.
# ==============================================================================

set -g word-separators " @!#$%^&*()+=[]{}|;:'\"<>?,`~"


# ==============================================================================
#  OPEN FILE/PATH IN A NEW SPLIT TO THE RIGHT
#
#  Usage:
#    copy-mode-vi: visually select a path (with or without :line), press o
#    mouse:        Ctrl+double-click any path or bare filename
#
#  All resolution logic lives in ~/.config/tmux/open-file.sh:
#    • strips a leading src/ to prevent CMSSW_BASE/src/src/... doubling
#    • falls back to $CMSSW_BASE/src/<path> for CMSSW-relative paths
#    • for bare filenames (no /): runs find under CMSSW_BASE/src and opens
#      directly if unique, or shows an fzf picker for multiple matches
#    • infers CMSSW_BASE by walking up the directory tree if not exported
#
#  Handles (examples):
#    RecoLocalCalo/Foo/Bar.cc:42       CMSSW-relative with line
#    src/RecoLocalCalo/Foo/Bar.cc      CMSSW-relative with leading src/
#    EcalRecHitProducer.cc             bare filename — searched under CMSSW src
#    /absolute/path/to/file.cc:10      absolute path
# ==============================================================================

bind -T copy-mode-vi o send-keys -X copy-pipe-and-cancel \
    "tr -d '\\n' | xargs -I{} tmux split-window -h -c '#{pane_current_path}' \
    'bash ~/.config/tmux/open-file.sh \"{}\"'"


# ==============================================================================
#  COPY MODE
# ==============================================================================

setw -g mode-keys vi

# Keep copy mode active after mouse drag
unbind -T copy-mode-vi MouseDragEnd1Pane

# Double-click selects the whole path (underscores included via word-separators)
bind -T root DoubleClick1Pane select-pane \; copy-mode \; send-keys -X select-word

# Ctrl+double-click: resolve and open the word under the cursor in a new split
bind -T root C-DoubleClick1Pane \
    select-pane \; \
    copy-mode \; \
    send-keys -X select-word \; \
    send-keys -X copy-pipe-and-cancel \
        "tr -d '\\n' | xargs -I{} tmux split-window -h -c '#{pane_current_path}' \
        'bash ~/.config/tmux/open-file.sh \"{}\"'"

# v=select  V=select line  y=copy  o=open in vim split
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \
    "xclip -in -selection clipboard 2>/dev/null || xsel --clipboard --input 2>/dev/null || cat"


# ==============================================================================
#  LAYOUTS
# ==============================================================================

# prefix+M-1  editor left (65%) | terminal right
bind M-1 select-layout main-vertical \; resize-pane -t 1 -x "65%"

# prefix+M-2  editor top (70%) | terminal bottom
bind M-2 select-layout main-horizontal \; resize-pane -t 1 -y "70%"


# ==============================================================================
#  COLOURS
# ==============================================================================

gray_light="#D8DEE9"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"


# ==============================================================================
#  STATUS BAR
# ==============================================================================

set -g status-left-length 80
set -g status-right-length 60

set -g status-style              "fg=${gray_light},bg=default"
set -g status-left               "#[fg=${green_soft},bold] #S #[fg=${gray_light},nobold]| "
set -g status-right              " #{cpu}  #{mem} "
set -g window-status-current-format "#[fg=${cyan_soft},bold] #[underscore]#I:#W"
set -g window-status-format      " #I:#W"
set -g message-style             "fg=${gray_light},bg=default"
set -g mode-style                "fg=${gray_dark},bg=${blue_muted}"
set -g pane-border-style         "fg=${gray_dark}"
set -g pane-active-border-style  "fg=${green_soft}"

# Show pane number and command in border
set -g pane-border-status top
set -g pane-border-format " #P: #{pane_current_command} "


# ==============================================================================
#  PLUGINS (TPM)
# ==============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor'

set -g @resurrect-capture-pane-contents 'on'
# set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
